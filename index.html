<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Solar System</title>
<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="space">
  <!-- Background stars -->
  <div class="stars">
    <!-- 30 random stars -->
    <div class="star" style="--x:5%; --y:10%; --size:1px; --delay:0s;"></div>
    <div class="star" style="--x:15%; --y:40%; --size:1px; --delay:1s;"></div>
    <div class="star" style="--x:25%; --y:70%; --size:1.5px; --delay:2s;"></div>
    <div class="star" style="--x:35%; --y:20%; --size:1px; --delay:3s;"></div>
    <div class="star" style="--x:45%; --y:50%; --size:1px; --delay:4s;"></div>
    <div class="star" style="--x:55%; --y:80%; --size:1.2px; --delay:5s;"></div>
    <div class="star" style="--x:65%; --y:15%; --size:1px; --delay:6s;"></div>
    <div class="star" style="--x:75%; --y:60%; --size:1px; --delay:7s;"></div>
    <div class="star" style="--x:85%; --y:25%; --size:1px; --delay:8s;"></div>
    <div class="star" style="--x:95%; --y:90%; --size:1px; --delay:9s;"></div>
  </div>

  <!-- Sun -->
  <div class="sun"></div>

  <!-- Orbits -->
  <div class="orbit orbit1"></div>
  <div class="orbit orbit2"></div>
  <div class="orbit orbit3"></div>
  <div class="orbit orbit4"></div>
  <div class="orbit orbit5"></div>
  <div class="orbit orbit6"></div>
  <div class="orbit orbit7"></div>
  <div class="orbit orbit8"></div>

  <!-- Planets (each inside a wrapper to rotate around sun) -->
  <div class="planet-wrapper wrapper1"><div class="planet planet1"></div></div>
  <div class="planet-wrapper wrapper2"><div class="planet planet2"></div></div>
  <div class="planet-wrapper wrapper3"><div class="planet planet3"></div></div>
  <div class="planet-wrapper wrapper4"><div class="planet planet4"></div></div>
  <div class="planet-wrapper wrapper5"><div class="planet planet5"></div></div>
  <div class="planet-wrapper wrapper6"><div class="planet planet6"></div></div>
  <div class="planet-wrapper wrapper7"><div class="planet planet7"></div></div>
  <div class="planet-wrapper wrapper8"><div class="planet planet8"></div></div>

  <!-- Falling stars -->
  <div class="falling-star star1"></div>
  <div class="falling-star star2"></div>
  <div class="falling-star star3"></div>
</div>
</body>
</html>
